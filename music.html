<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACK LIST | Spaceliner Official</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="support-hero">
        <div class="hero-content">
            <h1>TRACK ARCHIVE</h1>
            <p>ALL MUSIC LIST</p>
        </div>
    </header>

    <section id="tracks">
        <h2 class="sl-title">TRACKLIST</h2>
        <div class="search-container">
            <input type="text" id="track-search" placeholder="SEARCH TRACK OR ARTIST..." oninput="filterTracks()">
            <div class="filter-group">
                <div class="filter-header">Difficulty sort</div>
                    <label class="filter-item">
                        <input type="checkbox" value="ST" checked onchange="filterTracks()">
                        <span class="filter-label st-color">STANDARD</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="FD" checked onchange="filterTracks()">
                        <span class="filter-label fd-color">FULL DRIVE</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="OD" checked onchange="filterTracks()">
                        <span class="filter-label od-color">OVERDRIVE</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" value="UL" checked onchange="filterTracks()">
                        <span class="filter-label ul-color">UNLIMITED</span>
                    </label>
                <div class="filter-header" style="margin-left: 10px;">Level sort</div>
                <div class="level-range-filter">
                    <span>Lv.</span>
                    <input type="number" id="lv-min" min="1" max="30" placeholder="MIN" oninput="filterTracks()">
                    <span>〜</span>
                    <input type="number" id="lv-max" min="1" max="30" placeholder="MAX" oninput="filterTracks()">
                </div>
            </div>
        </div>
        <div class="track-scroll-area">
            <div id="track-container" class="track-container">
                <p class="loading">SYNCING DATA...</p>
            </div>
        </div>
    </section>
    
    <footer>
        <small>&copy; 2025-<span id="current-year"></span> PROJECT SPACELINER. All rights reserved.</small>
        <script>
            document.getElementById('current-year').textContent = new Date().getFullYear();
        </script>
    </footer>

    <script>
    // 検索フィルタリング用の関数
        function filterTracks() {
            const keyword = document.getElementById('track-search').value.toLowerCase();
            const selectedLevels = Array.from(document.querySelectorAll('.filter-group input[type="checkbox"]:checked'))
                                        .map(cb => cb.value);

            // 入力がない場合は、最小を0、最大を99として扱う
            const minInput = document.getElementById('lv-min').value;
            const maxInput = document.getElementById('lv-max').value;

            // 数値入力の値を取得（空の場合は制限なし）
            const minLv = minInput === "" ? 0 : parseInt(minInput);
            const maxLv = maxInput === "" ? 99 : parseInt(maxInput);

            renderTracks(keyword, selectedLevels, minLv, maxLv);
        }
        // ページ読み込み時に全ての曲パネルを表示するための初期実行
        window.onload = function() {
            // renderNews();
            // 初期状態（空検索、全難易度、Lv0〜99）で呼び出し
            renderTracks("", ["ST", "FD", "OD", "UL"], 0, 99);
            
            // --- 追加：アニメーション制御 ---
            const loader = document.getElementById('loader');
                
            // 1.5秒間「INITIALIZING...」を見せてからフェードアウト
            setTimeout(() => {
                loader.classList.add('is-finished');
                document.body.classList.add('is-loaded');
                    
                // アニメーションが終わったらDOMから削除（メモリ節約）
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 800);
            }, 1000);
        };

        function renderTracks(searchKeyword = "", selectedLevels = [], minLv = 0, maxLv = 99) {
            const container = document.getElementById('track-container');
            if(!container || !MUSIC_DATA) return;
            container.innerHTML = '';

            const filteredData = MUSIC_DATA.filter(track => {
                // 1. 検索ワード判定
                const matchesKeyword = track.title.toLowerCase().includes(searchKeyword) || 
                                       track.artist.toLowerCase().includes(searchKeyword);
        
                // 2. 難易度種類 & 数値判定
                // 選択された各難易度（ST, FD等）のうち、一つでも「数値が範囲内」であれば合格
                const hasMatchingLevel = selectedLevels.some(lv => {
                    const lvValue = parseInt(track[lv]);
                    if (!lvValue) return false; // その難易度が存在しない場合は除外
                    return lvValue >= minLv && lvValue <= maxLv;
                });

                return matchesKeyword && hasMatchingLevel;
            });

            if (filteredData.length === 0) {
                container.innerHTML = '<p class="loading">NO TRACKS FOUND</p>';
                return;
            }

            // 描画処理
            filteredData.forEach((track, index) => {
                const sideClass = (index % 2 === 0) ? 'side-l' : 'side-r';
                const div = document.createElement('div');
                div.className = `track-row ${sideClass}`;
        
               const getLvHtml = (label, value) => {
                    if (!value || value === "") return "";
                    return `<div class="${label}-label">Lv.${value}</div>`;
                };
                    
                div.innerHTML = `
                    <div class="track-cell">
                        <div class="track-info">
                            <span class="track-artist">${track.artist}</span>
                            <span class="track-title">${track.title}</span>
                        </div>
                        <div class="track-levels">
                            ${getLvHtml('ST', track.ST)}
                            ${getLvHtml('FD', track.FD)}
                            ${getLvHtml('OD', track.OD)}
                            ${getLvHtml('UL', track.UL)}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        renderTracks();
    </script>
</body>
</html>
